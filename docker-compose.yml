services:
  dask-scheduler:
    image: daskdev/dask:latest
    ports:
      - "8786:8786"
      - "8787:8787"
    command: dask-scheduler
    networks:
      - dask-network

  dask-worker:
    image: daskdev/dask:latest
    depends_on:
      - dask-scheduler
    command: dask-worker dask-scheduler:8786
    deploy:
      replicas: 1
    networks:
      - dask-network

networks:
  dask-network:
    driver: bridge
