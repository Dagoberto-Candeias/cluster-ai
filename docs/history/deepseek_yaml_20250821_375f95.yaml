name: CI/CD for Cluster AI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Test script syntax
      run: |
        bash -n scripts/install_cluster_ai.sh
        echo "Script syntax is valid"

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Docker image
      run: |
        docker build -t cluster-ai:latest .